<svg width="240" height="200" viewBox="0 0 240 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <filter id="envelope-glow" x="-10" y="-10" width="260" height="220" filterUnits="userSpaceOnUse">
    <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.05" />
  </filter>

  <!-- Background Card coming out of the envelope -->
  <g filter="url(#envelope-glow)">
    <rect x="55" y="25" width="130" height="100" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5" />
    <!-- Blue Lock inside the card -->
    <path d="M120 44C116.13 44 113 47.13 113 51V57H127V51C127 47.13 123.87 44 120 44Z" fill="#2563EB" />
    <rect x="111" y="57" width="18" height="15" rx="4" fill="#2563EB" />
    <circle cx="120" cy="62.5" r="2.5" fill="white" />
    <rect x="119" y="65" width="2" height="4" rx="1" fill="white" />
    
    <!-- Passcode Dots inside the card -->
    <circle cx="104" cy="85" r="3" fill="#38BDF8" />
    <circle cx="112" cy="85" r="3" fill="#38BDF8" />
    <circle cx="120" cy="85" r="3" fill="#38BDF8" />
    <circle cx="128" cy="85" r="3" fill="#38BDF8" />
    <circle cx="136" cy="85" r="3" fill="#38BDF8" />
  </g>

  <!-- Envelope Back Body -->
  <path d="M30 90 L120 150 L210 90 L210 170 C210 176.63 204.63 182 198 182 L42 182 C35.37 182 30 176.63 30 170 Z" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5" />

  <!-- Envelope Open Flap -->
  <path d="M30 90 L120 35 L210 90" fill="none" stroke="#E2E8F0" stroke-width="1.5" stroke-linejoin="round" />

  <!-- Envelope Front Side Wings -->
  <path d="M30 90 L120 148 L210 90" fill="#E2E8F0" opacity="0.3" />
  <path d="M30 182 L120 120 L210 182" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.2" />
  <path d="M30 90 L95 138 L30 182" fill="#E2E8F0" opacity="0.2" />
  <path d="M210 90 L145 138 L210 182" fill="#E2E8F0" opacity="0.2" />
</svg>
